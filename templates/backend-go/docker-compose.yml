version: "3.9"

services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: host=db user=postgres password=postgres dbname=gbit_db port=5432 sslmode=disable
      JWT_SECRET: troque_esta_chave_secreta
      JWT_REFRESH_SECRET: troque_esta_outra_chave_secreta
      PORT: 4000
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gbit_db
    ports:
      - "5432:5432"
    volumes:
      - gbit_pgdata_go:/var/lib/postgresql/data

volumes:
  gbit_pgdata_go:
